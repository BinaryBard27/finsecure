name: FinSecure API — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Validate environment config using env-check ──────────────────────
  # github.com/BinaryBard27/env-check runs FIRST.
  # A misconfigured .env has caused more production incidents than bad code.
  validate-config:
    name: Validate Environment (env-check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install env-check
        run: pip install envcheck-cli

      - name: Validate .env.example against schema.json
        run: env-check --schema schema.json --env .env.example --strict
        # If someone adds a required env var and forgets to update schema.json,
        # this blocks the merge. Config drift caught before it hits production.

  # ── Job 2: Security scan ──────────────────────────────────────────────────
  security-scan:
    name: Security Scan (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit security scanner
        run: bandit -r app/ -ll  # Only report medium+ severity
        # bandit catches: hardcoded passwords, SQL injection, unsafe crypto,
        # shell injection — common vulnerabilities in finance backends

  # ── Job 3: Lint ───────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check app/ tests/

  # ── Job 4: Test ───────────────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: [validate-config]  # Only run if env config is valid

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: finsecure_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      DATABASE_URL: postgresql+asyncpg://testuser:testpass@localhost:5432/finsecure_test
      JWT_SECRET_KEY: test-secret-key-for-ci-exactly-32-chars-long
      AES_ENCRYPTION_KEY: test-aes-key-exactly-32-bytesx
      APP_ENV: dev
      PORT: "8080"
      FRAUD_SCORE_THRESHOLD: "2.5"
      MAX_TRANSFER_AMOUNT: "500000"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=70

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
